<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SortViz</title>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;700;800&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Oxanium', monospace;
      overflow: hidden;
    }

    /* subtle grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(91,143,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,143,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .wrap {
      position: relative;
      text-align: center;
      padding: 40px 24px;
      z-index: 1;
    }

    /* ── EYEBROW ── */
    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #5b8fff;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.2s forwards;
    }

    /* ── MAIN TITLE — each word slides up ── */
    .title {
      font-size: clamp(52px, 10vw, 112px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
      color: #eef2ff;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .title-line {
      display: block;
      overflow: hidden;
    }
    .title-line span {
      display: inline-block;
      transform: translateY(110%);
      animation: slideUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .title-line:nth-child(1) span { animation-delay: 0.35s; }
    .title-line:nth-child(2) span {
      animation-delay: 0.55s;
      color: #7aaaff;
    }
    .title-line:nth-child(3) span { animation-delay: 0.72s; }

    /* ── TYPEWRITER SUBTITLE ── */
    .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: clamp(12px, 1.5vw, 15px);
      color: #5a5a7a;
      letter-spacing: 0.06em;
      margin-bottom: 56px;
      opacity: 0;
      animation: fadeUp 0.6s ease 1.2s forwards;
      min-height: 1.6em;
    }
    .cursor {
      display: inline-block;
      width: 2px; height: 1em;
      background: #5b8fff;
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 0.9s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

    /* ── BUTTON ── */
    .btn-wrap {
      opacity: 0;
      animation: fadeUp 0.6s ease 1.5s forwards;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 48px;
      font-family: 'Oxanium', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #0a0a0f;
      background: #7aaaff;
      text-decoration: none;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s, box-shadow 0.25s;
    }
    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(110deg, transparent 25%, rgba(255,255,255,0.28) 50%, transparent 75%);
      transform: translateX(-120%);
      transition: transform 0.5s ease;
    }
    .btn:hover::after { transform: translateX(120%); }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(91,143,255,0.4);
    }
    .btn:active { transform: translateY(0); }
    .arrow {
      font-size: 18px;
      transition: transform 0.2s;
    }
    .btn:hover .arrow { transform: translateX(5px); }

    @keyframes slideUp {
      to { transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="wrap">

  <p class="eyebrow">Algorithm Visualizer</p>

  <h1 class="title">
    <span class="title-line"><span>Sorting</span></span>
    <span class="title-line"><span>Algorithms</span></span>
    <span class="title-line"><span>Visualized</span></span>
  </h1>

  <p class="subtitle">
    <span id="typeText"></span><span class="cursor"></span>
  </p>

  <div class="btn-wrap">
    <a href="app.html" class="btn">
      Continue <span class="arrow">→</span>
    </a>
  </div>

</div>

<script>
  // typewriter
  const phrases = [
    'Watch every comparison. Every swap.',
    'Bubble, Merge, Quick, Heap — and more.',
    'Adjust speed. Change array size. Learn.',
  ];
  let pi = 0, ci = 0, deleting = false, wait = 0;
  const el = document.getElementById('typeText');

  function type() {
    if (wait > 0) { wait--; setTimeout(type, 60); return; }
    const phrase = phrases[pi];
    if (!deleting) {
      el.textContent = phrase.slice(0, ++ci);
      if (ci === phrase.length) { deleting = true; wait = 28; }
    } else {
      el.textContent = phrase.slice(0, --ci);
      if (ci === 0) { deleting = false; pi = (pi + 1) % phrases.length; wait = 6; }
    }
    setTimeout(type, deleting ? 28 : 55);
  }
  setTimeout(type, 1800);
</script>

</body>
</html>
